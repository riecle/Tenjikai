 {id:"flir",zone:"製造業DX展",pri:"◎",name:"フリアーシステムズ（FLIR）",

const SELL=["測る","判断","両方","？"], METHOD=["専用機","汎用+AI","？"], EDGE=["エッジ可","クラウドのみ","？"], VERDICT=["成立","△","不成立"];

// ---------- storage (auto-detect) ----------
let MODE = "memory"; // claude | local | memory
const store = {
  async init(){
    try{
      if (window.storage && window.storage.set){
        await window.storage.set(KEY+"-t","1");
        try{ await window.storage.delete(KEY+"-t"); }catch(e){}
        MODE="claude"; return;
      }
    }catch(e){}
    try{ localStorage.setItem(KEY+"-t","1"); localStorage.removeItem(KEY+"-t"); MODE="local"; return; }catch(e){}
    MODE="memory";
  },
  async load(){
    try{
      if (MODE==="claude"){ const r = await window.storage.get(KEY); return (r && r.value) ? JSON.parse(r.value) : null; }
      if (MODE==="local"){ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }
    }catch(e){}
    return null;
  },
  async save(d){
    try{
      const s = JSON.stringify(d);
      if (MODE==="claude"){ await window.storage.set(KEY, s); return true; }
      if (MODE==="local"){ localStorage.setItem(KEY, s); return true; }
    }catch(e){}
    return false;
  }
};

// ---------- state ----------

const byId = id => allCompanies().find(c => c.id===id);

function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.style.display="block"; clearTimeout(t._x); t._x=setTimeout(()=>t.style.display="none",2000); }

    h += '<div class="warn">この開き方だと自動保存が効きません。1〜2ブースごとに下のボタンでコピーし、メモアプリに貼ってください。<button onclick="copyJSONL()">JSONLを今すぐコピー（'+S.records.length+'件）</button></div>';
  }
  ZONES.forEach(z=>{
    const cs = all.filter(c=>c.zone===z);
    if(!cs.length) return;
    h += '<div class="zonehd">'+esc(z)+'</div>';
    cs.forEach(c=>{
      const n = recsOf(c.id).length, done = n>0;
      const tag = c.hyp ? (c.hyp.indexOf("H")===0 ? c.hyp.split("　")[0].split(" ")[0] : c.hyp.slice(0,22)) : "";
      h += '<button class="rowbtn'+(done?" done":"")+'" onclick="openC(\''+c.id+'\')">'
        + '<span class="pri '+(c.pri==="◎"?"hot":"cold")+'">'+c.pri+'</span>'
        + '<span class="nm">'+esc(c.name)+(tag?'<small>'+esc(tag)+'</small>':"")+'</span>'
        + '<span class="st mono">'+(done ? "済"+(n>1?"×"+n:"") : "—")+'</span></button>';
    });
  });
  h += '<button class="addbtn" onclick="openCustom()">＋ 飛び込みブースを追加</button>';
  app.innerHTML = h;
  window.scrollTo(0,0);
}
function toggleH(){ S.showH=!S.showH; renderList(); }

// ---------- DETAIL ----------
function chipRow(label, group, opts, cols){
  return '<div class="lbl">'+label+'</div><div class="grid g'+cols+'">'
    + opts.map(o=>'<button class="chip'+(S.form[group]===o?" on":"")+(o==="不成立"?" rose":"")+'" data-g="'+group+'" data-v="'+esc(o)+'" onclick="tapChip(this)">'+esc(o)+'</button>').join("")
    + '</div>';
}
function tapChip(el){
  const g=el.dataset.g, v=el.dataset.v;
  S.form[g] = (S.form[g]===v) ? "" : v;
  el.parentElement.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", S.form[g]===c.dataset.v));
}
function tapPartner(el){ S.form.partner=!S.form.partner; el.classList.toggle("on", S.form.partner); }
function tapZone(el){
  S.customZone = el.dataset.v;
  el.parentElement.querySelectorAll(".chip").forEach(c=>c.classList.toggle("on", S.customZone===c.dataset.v));
}

function openC(id){
  const c = byId(id); if(!c) return;
  const prev = recsOf(id), last = prev[prev.length-1];
  S.form = last ? {sell:last.sell,method:last.method,edge:last.edge,verdict:last.verdict,partner:!!last.partner,note:last.note}
                : {sell:"",method:"",edge:"",verdict:"",partner:false,note:""};
  S.cur = c;
  renderDetail(false);
}
function openCustom(){
  S.form = {sell:"",method:"",edge:"",verdict:"",partner:false,note:""};
  S.customName=""; S.customZone="その他";
  S.cur = {isNew:true};
  renderDetail(true);
}
function renderDetail(isNew){
  let h = '<button class="back" onclick="renderList()">← 一覧へ</button>';
  if (isNew){
    h += '<input type="text" placeholder="社名を入力" value="" oninput="S.customName=this.value">'
      + '<div class="lbl">ゾーン</div><div class="grid g3">'
      + ZONES.map(z=>'<button class="chip'+(S.customZone===z?" on":"")+'" data-v="'+esc(z)+'" onclick="tapZone(this)" style="font-size:12px;">'+esc(z.replace("展",""))+'</button>').join("")
      + '</div>';
  } else {
    const c = S.cur;
    h += '<div style="display:flex;gap:8px;align-items:flex-start;">'
      + '<span class="pri '+(c.pri==="◎"?"hot":"cold")+'" style="font-size:20px;">'+c.pri+'</span><h2>'+esc(c.name)+'</h2></div>'
      + '<div class="mono" style="font-size:11px;color:var(--dim);margin-top:4px;">'+esc(c.zone)+'</div>'
      + (c.view ? '<p class="view">'+esc(c.view)+'</p>' : "")
      + (c.hyp ? '<div class="hypbox">仮説：'+esc(c.hyp)+'</div>' : "")
      + (c.qs||[]).map((q,i)=>'<div class="q"><b class="mono">Q'+(i+1)+'</b><span>'+esc(q)+'</span></div>').join("")
      + (c.learn ? '<div class="learn">→ 分かる：'+esc(c.learn)+'</div>' : "");
  }
  h += '<div class="hr"></div>'
    + chipRow("売り物","sell",SELL,4)
    + chipRow("方式","method",METHOD,3)
    + chipRow("エッジ","edge",EDGE,3)
    + chipRow("仮説の判定","verdict",VERDICT,3)
    + '<div style="margin-top:14px;"><button class="chip sky wide'+(S.form.partner?" on":"")+'" onclick="tapPartner(this)">☆ 協業・代理店候補</button></div>'
    + '<div class="lbl">刺さった一言・価格・気づき</div>'
    + '<textarea id="note" rows="4" placeholder="音声入力が速い。1行でOK" oninput="S.form.note=this.value"></textarea>'
    + '<div class="savebar"><button onclick="save()">保存して一覧へ</button></div>';
  app.innerHTML = h;
  document.getElementById("note").value = S.form.note || "";
  window.scrollTo(0,0);
}

async function save(){
  let c = S.cur;
  if (c.isNew){
    const nm = (S.customName||"").trim();
    if(!nm){ toast("社名を入れてください"); return; }
    const id = "c_"+Date.now();
    c = {id:id, name:nm, zone:S.customZone};
    S.customs.push(c);
  }
  const rec = {
    ts:new Date().toISOString(), id:c.id, name:c.name, zone:c.zone,
    sell:S.form.sell||"", method:S.form.method||"", edge:S.form.edge||"",
    verdict:S.form.verdict||"", partner:!!S.form.partner, note:(S.form.note||"").trim()
  };
  S.records.push(rec);
  const ok = await store.save({records:S.records, customs:S.customs});
  if (ok){
    const d=new Date(); S.lastSaved = ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
    toast("保存しました（"+S.records.length+"件）");
  } else {
    toast("⚠端末に保存できません。JSONLコピーで退避を");
  }
  renderList();
}

// ---------- EXPORT ----------
function jsonl(){ return S.records.map(r=>JSON.stringify(r)).join("\n"); }
function md(){
  let out = "# 巡回ログ 2026-07-02 ものづくりワールド東京\n\n";
  const all = allCompanies();
  ZONES.forEach(z=>{
    const cs = all.filter(c=>c.zone===z);
    if(!cs.length) return;
    out += "## "+z+"\n";
    cs.forEach(c=>{
      const rs = recsOf(c.id);
      if(!rs.length){ out += "- [未] "+c.pri+" "+c.name+"\n"; return; }
      const r = rs[rs.length-1];
      const tags=[r.verdict&&("仮説:"+r.verdict), r.sell, r.method, r.edge, r.partner&&"☆協業候補"].filter(Boolean).join(" / ");
      out += "- [済] "+c.pri+" "+c.name+(tags?" ｜ "+tags:"")+(r.note?" ｜ "+r.note:"")+"\n";
    });
    out += "\n";
  });
  return out;
}
function copyText(text, label){
  const done = ok => toast(ok ? label+"をコピーしました" : "下の欄を長押しで全選択→コピーしてください");
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>done(true)).catch(()=>fallbackCopy(text, done));
  } else fallbackCopy(text, done);
}
function fallbackCopy(text, done){
  try{
    const ta=document.createElement("textarea"); ta.value=text;
    ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    const ok=document.execCommand("copy"); ta.remove(); done(ok);
  }catch(e){ done(false); }
}
function copyJSONL(){ copyText(jsonl(),"JSONL"); }
function copyMD(){ copyText(md(),"まとめ"); }

function renderExport(){
  const all = allCompanies();
  const doneAll = all.filter(c=>recsOf(c.id).length).length;
  app.innerHTML =
    '<button class="back" onclick="renderList()">← 一覧へ</button>'
    + '<h2>書き出し</h2>'
    + '<div class="mono" style="font-size:12px;color:var(--dim);margin-top:4px;">記録 '+S.records.length+' 件 ｜ 訪問 '+doneAll+'/'+all.length+'</div>'
    + badgeHTML()
    + '<div class="exbtns"><button class="primary" onclick="copyJSONL()">JSONLコピー</button><button class="ghost" onclick="copyMD()">まとめコピー</button></div>'
    + '<div class="note-s">JSONL＝1記録1行の追記形式（帰宅後パイプライン用）。まとめ＝Markdownの巡回サマリ。</div>'
    + '<div class="lbl">JSONL</div><textarea id="exj" class="code" rows="8" readonly onclick="this.select()"></textarea>'
    + '<div class="lbl">まとめ（Markdown）</div><textarea id="exm" class="code" rows="11" readonly onclick="this.select()"></textarea>';
  document.getElementById("exj").value = jsonl() || "（まだ記録がありません）";
  document.getElementById("exm").value = md();
  window.scrollTo(0,0);
}

// ---------- init ----------
(async function(){
  await store.init();
  const d = await store.load();
  if (d){ S.records = d.records||[]; S.customs = d.customs||[]; }
  renderList();
})();

// ---------- PWA: offline support ----------
if ("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
